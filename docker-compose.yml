version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meepro-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://root:pwD%4020200@mariadb:3306/meepro_petshop
      - DB_HOST=mariadb
      - DB_USER=root
      - DB_PASSWORD=pwD@20200
      - DB_NAME=meepro_petshop
      - NODE_ENV=production
      - NEXT_PUBLIC_URL=
    depends_on:
      - mariadb
    volumes:
      - meepro_uploads:/app/public/uploads
    networks:
      - meepro-net
      - nginx-proxy-net

  mariadb:
    image: mariadb:11
    container_name: meepro-mariadb
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: "pwD@20200"
      MARIADB_DATABASE: meepro_petshop
      MARIADB_CHARACTER_SET: utf8mb4
      MARIADB_COLLATION: utf8mb4_unicode_ci
    volumes:
      - meepro_db_data:/var/lib/mysql
    networks:
      - meepro-net

volumes:
  meepro_db_data:
  meepro_uploads:

networks:
  meepro-net:
  nginx-proxy-net:
    external: true
