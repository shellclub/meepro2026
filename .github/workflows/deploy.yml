name: Deploy to Production Server

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 40m
          command_timeout: 30m
          script_stop: false
          script: |
            cd /root/meepro2026
            git pull origin main
            
            # Create shared network for nginx proxy manager (if not exists)
            docker network create nginx-proxy-net || true
            
            # Rebuild and restart the container
            docker compose down
            docker compose up -d --build
            
            # Connect nginx_proxy_manager to the shared network (if not already connected)
            docker network connect nginx-proxy-net nginx_proxy_manager || true
            
            # Wait for app to start
            echo "Waiting 20 seconds for app to start..."
            sleep 20
            
            # Check container status
            echo "=== Container Status ==="
            docker compose ps
            
            # Show recent logs
            echo "=== App Logs (last 50 lines) ==="
            docker compose logs --tail=50 app
            
            # Check if port 3000 is responding
            echo "=== Health Check ==="
            curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" http://localhost:3000/ || echo "App is not responding on port 3000"
            
            # Clean up old unused images (don't fail if prune errors)
            docker image prune -af || true
            
            echo "Deploy completed successfully!"
